services:
  mongo:
    image: mongo:7
    container_name: kmath-mongo
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    networks:
      - internal

  backend:
    build: ./backend
    container_name: kmath-backend
    restart: unless-stopped
    environment:
      MONGO_URL: mongodb://mongo:27017/kmath
      NODE_ENV: production
      PORT: "3000"
    depends_on:
      - mongo
    networks:
      - internal

  frontend:
    image: caddy:2
    container_name: kmath-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./dist:/srv/dist:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - backend
    networks:
      - internal

volumes:
  mongo-data:
  caddy-data:
  caddy-config:

networks:
  internal:
