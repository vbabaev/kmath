---
# Deploy the kmath stack to klearn.vbabaev.uk.
#
# Flow:
#   1. Build the frontend locally (npm run build).
#   2. Run backend tests locally; abort on failure.
#   3. Rsync the source tree + built dist to /opt/klearn on the host.
#   4. `docker compose up -d --build` on the host.
#   5. Wait for /api/health to return 200.
#
# Notes:
# - The host is NOT a git checkout; files are owned by uid 501 / gid staff
#   because they originated on the mac. We preserve that ownership.
# - backend/.env is root:root 600 on the host and contains secrets that
#   are NOT in the repo. It must never be overwritten by this playbook;
#   it lives outside the rsync source.
# - We rebuild the backend image every deploy (--build) so source changes
#   in backend/ get picked up. Frontend is static files served by Caddy
#   straight off the host filesystem — no image rebuild needed.

- name: Local pre-flight
  hosts: localhost
  gather_facts: false
  connection: local
  vars:
    project_root: "{{ playbook_dir }}/.."
  tasks:
    - name: Backend tests
      ansible.builtin.command: npm test
      args:
        chdir: "{{ project_root }}/backend"
      register: backend_tests
      changed_when: false

    - name: Frontend production build
      ansible.builtin.command: npm run build
      args:
        chdir: "{{ project_root }}"
      register: frontend_build
      changed_when: true

    - name: Confirm dist exists
      ansible.builtin.stat:
        path: "{{ project_root }}/dist/index.html"
      register: dist_index
      failed_when: not dist_index.stat.exists

- name: Push code to host
  hosts: klearn
  gather_facts: false
  vars:
    project_root: "{{ playbook_dir }}/.."
  tasks:
    - name: Ensure deploy_root exists
      ansible.builtin.file:
        path: "{{ deploy_root }}"
        state: directory
        mode: "0755"

    - name: Rsync source tree + built dist
      ansible.posix.synchronize:
        src: "{{ project_root }}/"
        dest: "{{ deploy_root }}/"
        delete: false  # preserve backend/.env, .idea, and similar host-only state
        rsync_opts:
          # Repo-private/local-only paths
          - "--exclude=.git"
          - "--exclude=.gitignore"
          - "--exclude=.claude"
          - "--exclude=.idea"
          - "--exclude=.vscode"
          - "--exclude=.DS_Store"
          - "--exclude=node_modules"
          - "--exclude=backend/node_modules"
          # Secrets that live only on the host
          - "--exclude=backend/.env"
          # Dev-only compose file
          - "--exclude=docker-compose.dev.yml"
          # The Ansible directory itself — no need on the host
          - "--exclude=deploy"

    - name: docker compose up (rebuild backend image)
      ansible.builtin.command: docker compose up -d --build
      args:
        chdir: "{{ deploy_root }}"
      register: compose_up
      changed_when: "'Started' in compose_up.stderr or 'Recreated' in compose_up.stderr or 'Built' in compose_up.stderr"

    - name: Wait for backend health
      # Hit the public URL: Caddy redirects HTTP→HTTPS and the local TLS
      # cert is only valid for klearn.vbabaev.uk, so probing 127.0.0.1
      # fails the handshake. Public URL exercises Caddy + TLS + backend.
      ansible.builtin.uri:
        url: https://klearn.vbabaev.uk/api/health
        status_code: 200
      register: health
      retries: 20
      delay: 2
      until: health.status == 200

    - name: Show container status
      ansible.builtin.command: docker compose ps
      args:
        chdir: "{{ deploy_root }}"
      register: ps_out
      changed_when: false

    - name: Print container status
      ansible.builtin.debug:
        var: ps_out.stdout_lines
